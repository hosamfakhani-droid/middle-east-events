name: Replace wedding image

on:
  push:
    paths:
      - '.github/workflows/replace-wedding-image.yml'

permissions:
  contents: write

jobs:
  replace-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Replace image and update references
        shell: bash
        run: |
          cat > /tmp/image.b64 <<'IMAGE_EOF'

IMAGE_EOF
          base64 -d /tmp/image.b64 > docs/assets/ig-wedding-oxygen.jpg
          sed -i 's/ig-wedding-oxygen\.png/ig-wedding-oxygen.jpg/g' docs/index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/assets/ig-wedding-oxygen.jpg
          git commit -m "Replace wedding image with uploaded photo"
          git push origin main
